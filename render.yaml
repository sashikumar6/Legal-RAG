# Render Blueprint for Legal RAG System
services:
  # ---------------------------------------------------------------------------
  # Vector Database (Qdrant)
  # ---------------------------------------------------------------------------
  - type: web
    name: qdrant
    env: docker
    image: qdrant/qdrant:v1.12.4
    plan: starter # Needs starter for persistent disk
    disk:
      name: qdrant-storage
      mountPath: /qdrant/storage
      sizeGB: 10
    envVars:
      - key: QDRANT__SERVICE__GRPC_PORT
        value: 6334

  # ---------------------------------------------------------------------------
  # Backend (FastAPI)
  # ---------------------------------------------------------------------------
  - type: web
    name: backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: legal-rag-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: legal-rag-db
          property: connectionString
      - key: REDIS_URL
        fromKeyValueStore:
          name: legal-rag-redis
          property: connectionString
      - key: QDRANT_HOST
        fromService:
          type: web
          name: qdrant
          property: host
      - key: QDRANT_PORT
        value: 6333
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: OPENAI_API_KEY
        sync: false # Set in Render dashboard
      - key: CORS_ORIGINS
        value: "*" # Or set to your frontend URL
      - key: FEDERAL_XML_BASE_PATH
        value: /data/xml
    disk:
      name: federal-data
      mountPath: /data/xml
      sizeGB: 10

  # ---------------------------------------------------------------------------
  # Celery Worker
  # ---------------------------------------------------------------------------
  - type: worker
    name: celery-worker
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && celery -A app.workers worker -l info -Q ingestion,document
    envVars:
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: legal-rag-db
          property: connectionString
      - key: REDIS_URL
        fromKeyValueStore:
          name: legal-rag-redis
          property: connectionString
      - key: QDRANT_HOST
        fromService:
          type: web
          name: qdrant
          property: host
      - key: OPENAI_API_KEY
        sync: false
      - key: FEDERAL_XML_BASE_PATH
        value: /data/xml

  # ---------------------------------------------------------------------------
  # Frontend (Next.js)
  # ---------------------------------------------------------------------------
  - type: web
    name: frontend
    env: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: backend
          property: url

databases:
  - name: legal-rag-db
    databaseName: federal_law_agent
    plan: starter

keyvaluestores:
  - name: legal-rag-redis
    type: redis
    plan: free
