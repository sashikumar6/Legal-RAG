# Render Blueprint for 100% Free Legal RAG System
# Uses Free Tiers for all services (Render Free, Supabase, Qdrant Cloud, Upstash)

services:
  # ---------------------------------------------------------------------------
  # Backend (FastAPI) - Render Free Plan
  # ---------------------------------------------------------------------------
  - type: web
    name: backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false # Set this to your Supabase Connection String
      - key: DATABASE_URL_SYNC
        sync: false # Set this to your Supabase Connection String (Sync)
      - key: REDIS_URL
        sync: false # Set this to your Upstash Redis URL
      - key: QDRANT_HOST
        sync: false # Set this to your Qdrant Cloud URL (e.g. https://xyz.qdrant.io)
      - key: QDRANT_API_KEY
        sync: false # Set this to your Qdrant Cloud API Key
      - key: OPENAI_API_KEY
        sync: false # Set this to your OpenAI API Key
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "*" # Set to your frontend Render URL
      - key: FEDERAL_XML_BASE_PATH
        value: /tmp/xml # Use /tmp for ephemeral ingestion if needed

  # ---------------------------------------------------------------------------
  # Frontend (Next.js) - Render Free Plan
  # ---------------------------------------------------------------------------
  - type: web
    name: frontend
    env: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: backend
          property: url
