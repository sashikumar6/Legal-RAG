# Prometheus scrape configuration for the Legal AI Intake Agent
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/alert_rules.yml

# ---------------------------------------------------------------------------
# Scrape targets
# ---------------------------------------------------------------------------

scrape_configs:
  # -- Application metrics (FastAPI /metrics endpoint) -----------------------
  - job_name: "backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          service: "legal-ai-backend"

  # -- Prometheus self-monitoring --------------------------------------------
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # -- Node Exporter (host-level CPU, memory, disk) --------------------------
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: "infrastructure"

  # -- cAdvisor (per-container resource usage) -------------------------------
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          service: "infrastructure"

  # -- PostgreSQL Exporter ---------------------------------------------------
  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: "postgres"

  # -- Redis Exporter --------------------------------------------------------
  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "redis"
