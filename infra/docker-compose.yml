services:
  # ---------------------------------------------------------------------------
  # Infrastructure Services
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: federal_law_agent
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  # ---------------------------------------------------------------------------
  # Backend
  # ---------------------------------------------------------------------------

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/federal_law_agent
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@postgres:5432/federal_law_agent
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      FEDERAL_XML_BASE_PATH: /data/xml
    volumes:
      - ../backend:/app
      - ..:/data/xml
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    profiles:
      - full
      - backend

  # Celery Worker
  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.workers worker -l info -Q ingestion,document
    env_file:
      - .env
    environment:
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@postgres:5432/federal_law_agent
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QDRANT_HOST: qdrant
      FEDERAL_XML_BASE_PATH: /data/xml
    volumes:
      - ../backend:/app
      - ..:/data/xml
      - upload_data:/app/uploads
    depends_on:
      - redis
      - postgres
      - qdrant
    profiles:
      - full
      - backend

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000/api/v1
    depends_on:
      - backend
    profiles:
      - full
      - frontend

  # ---------------------------------------------------------------------------
  # Nginx
  # ---------------------------------------------------------------------------

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    profiles:
      - full

  # ===========================================================================
  # Monitoring & Observability Stack
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Prometheus — metrics collection and alerting
  # ---------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    restart: unless-stopped
    profiles:
      - full
      - monitoring

  # ---------------------------------------------------------------------------
  # Grafana OSS — dashboards and visualization
  # ---------------------------------------------------------------------------

  grafana:
    image: grafana/grafana-oss:11.1.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/api_health.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    profiles:
      - full
      - monitoring

  # ---------------------------------------------------------------------------
  # Loki — log aggregation backend
  # ---------------------------------------------------------------------------

  loki:
    image: grafana/loki:3.1.0
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    restart: unless-stopped
    profiles:
      - full
      - monitoring

  # ---------------------------------------------------------------------------
  # Promtail — log shipping agent
  # ---------------------------------------------------------------------------

  promtail:
    image: grafana/promtail:3.1.0
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki
    restart: unless-stopped
    profiles:
      - full
      - monitoring

  # ---------------------------------------------------------------------------
  # Node Exporter — host-level metrics (CPU, memory, disk, network)
  # ---------------------------------------------------------------------------

  node-exporter:
    image: prom/node-exporter:v1.8.2
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    restart: unless-stopped
    profiles:
      - full
      - monitoring

  # ---------------------------------------------------------------------------
  # cAdvisor — container-level resource usage metrics
  # ---------------------------------------------------------------------------

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped
    profiles:
      - full
      - monitoring

  # ---------------------------------------------------------------------------
  # PostgreSQL Exporter — database metrics for Prometheus
  # ---------------------------------------------------------------------------

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@postgres:5432/federal_law_agent?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - full
      - monitoring

  # ---------------------------------------------------------------------------
  # Redis Exporter — cache/queue metrics for Prometheus
  # ---------------------------------------------------------------------------

  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: "redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - full
      - monitoring

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  upload_data:
  prometheus_data:
  grafana_data:
  loki_data:
