# Grafana Dashboard Provisioning
# Auto-load dashboard JSON files on first boot
# =============================================================================

apiVersion: 1

providers:
  - name: "Legal AI Agent Dashboards"
    orgId: 1
    folder: "Legal AI Agent"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
